# Railway.app Configuration
# Hybrid deployment: Web UI + Scheduler (stealth scraper runs locally)
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "deployment/Dockerfile"

[deploy]
# Run start.sh which launches both web UI and scheduler
startCommand = "./deployment/start.sh"
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3
numReplicas = 1

# Health check endpoint
healthcheckPath = "/"
healthcheckTimeout = 10

# Volume for persistent SQLite database
[[volumes]]
name = "handelsregister-data"
mountPath = "/data"
