# Railway.app Configuration
# Hybrid deployment: Web UI + Scheduler (stealth scraper runs locally)
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "deployment/Dockerfile"

[deploy]
# Simple uvicorn command - scheduler runs separately or not at all on Railway
startCommand = "cd /app && uvicorn web.app:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3
numReplicas = 1

# Health check endpoint
healthcheckPath = "/health"
healthcheckTimeout = 30

# Volume for persistent SQLite database
[[volumes]]
name = "handelsregister-data"
mountPath = "/data"
